app:
  base-url: ${APP_BASE_URL:http://localhost:8080}
  
spring:
  mvc:
    static-path-pattern: "/uploads/**"
  web:
    resources:
      static-locations: "file:${UPLOAD_DIR:/app/uploads}/"

  application:
    name: store

  datasource:
    driver-class-name: ${DB_DRIVER:com.mysql.cj.jdbc.Driver}
    url: ${DB_URL:jdbc:mysql://db:3306/techlabdb}
    username: ${DB_ROOT_USER:root}
    password: ${DB_PASSWORD:root}

  sql:
    init:
      mode: always
      data-locations:

  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        show-sql: true
    database-platform: ${DB_DIALECT:org.hibernate.dialect.MySQLDialect}

  h2:
    console:
      enabled: false
      path: /h2-console

spring.main.allow-bean-definition-overriding: true

server:
  port: 8080